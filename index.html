<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>BSR Kreuzworträtsel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="grid-container">
    <h1>BSR Kreuzworträtsel</h1>
    <table id="crossword"></table>
  </div>

  <div id="hints">
    <h2>Hinweise</h2>
    <div class="hint-group">
      <h3>Waagerecht</h3>
      <ul id="hints-across"></ul>
    </div>
    <div class="hint-group">
      <h3>Senkrecht</h3>
      <ul id="hints-down"></ul>
    </div>
  </div>

  <div id="controls">
    <button id="neu-btn">Neues zufälliges Rätsel</button>
    <button id="check-btn">Rätsel prüfen</button>
  </div>

  <div id="secret-popup">
    <div id="secret-popup-content">
      <h2>Geschafft!</h2>
      <p>Schicke wortlos folgendes an die IT:</p>
      <p><strong id="secret-code">KEHRWERT</strong></p>
      <button id="close-popup">Schließen</button>
    </div>
  </div>

  <script src="crossword.js"></script>
  <script src="app.js"></script>
</body>
</html>
